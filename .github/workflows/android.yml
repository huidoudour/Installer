name: Android CI

on:
  push:
    branches: [ "master" , "ccrh_cache" , "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create debug keystore file
      run: |
        echo "${{ secrets.DEBUG_KEY_STORE_B64 }}" | base64 -d > debug_sign_key
        ls -lh debug_sign_key
        file debug_sign_key
    
    - name: Build Debug APK with signing
      run: |
        ./gradlew assembleDebug \
          -Pandroid.injected.signing.store.file=$(pwd)/debug_sign_key \
          -Pandroid.injected.signing.store.password="${{ secrets.DEBUG_KEY_PASSWD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.DEBUG_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.DEBUG_KEY_PASSWD }}" \
          --stacktrace
    
    - name: Copy Debug APK to output
      run: |
        mkdir -p output/debug
        # Copy only universal APK
        cp app/build/outputs/apk/debug/app-universal-debug.apk output/debug/ 2>/dev/null || true
        # List generated files
        ls -lh output/debug/
        # Show build output structure for debugging
        echo "=== Debug APK files in build output ==="
        find app/build/outputs/apk/debug -name "*.apk" -type f 2>/dev/null || true
    
    - name: Upload Debug APKs as artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apks
        path: output/debug/
    
    - name: Clean up debug keystore
      if: always()
      run: rm -f debug_sign_key

  build-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create release keystore file
      run: |
        echo "${{ secrets.SIGN_KEY_STORE_B64 }}" | base64 -d > sign_key
        ls -lh sign_key
        file sign_key
    
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$(pwd)/sign_key \
          -Pandroid.injected.signing.store.password="${{ secrets.SIGN_KEY_STORE_PASSWD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.SIGN_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.SIGN_KEY_ALIAS_PASSWD }}" \
          --stacktrace
    
    - name: Verify APK signature
      run: |
        echo "APK build completed. Files in output directory:"
        find app/build/outputs/apk/release -name "*.apk" -type f -exec ls -lh {} \;
    
    - name: Copy Release APK to output
      run: |
        mkdir -p output/release
        # Copy only universal APK
        cp app/build/outputs/apk/release/app-universal-release.apk output/release/ 2>/dev/null || true
        # List generated files
        ls -lh output/release/
        # Show build output structure for debugging
        echo "=== Release APK files in build output ==="
        find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null || true
    
    - name: Upload Release APKs as artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: output/release/
    
    - name: Clean up keystore
      if: always()
      run: rm -f sign_key
